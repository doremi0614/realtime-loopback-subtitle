<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';" />
  <title>字幕懸浮視窗</title>
  <style>
    /* 廣泛的 CJK 字型後援：繁中/簡中/日文/韓文，Windows 與 Linux(Noto) 皆涵蓋 */
    :root {
      --font: "Segoe UI", "Microsoft JhengHei", "Microsoft YaHei", "Malgun Gothic",
              "Yu Gothic UI", "Meiryo", "Noto Sans CJK TC", "Noto Sans TC", "Noto Sans SC",
              "Noto Sans JP", "Noto Sans KR", system-ui, sans-serif;
    }
    html, body {
      margin: 0; padding: 0; height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: var(--font);
      -webkit-user-select: none;
    }
    /* 直向排版：字幕在上（可伸縮），控制列固定在下 → 拖曳把手永遠可見 */
    #overlayRoot {
      position: relative;
      display: flex; flex-direction: column;
      height: 100vh; padding: 10px 14px 14px;  /* 底部加大避免把手被切 */
    }
    #overlayRoot.show-bounds::before {
      content: ''; position: absolute; inset: 2px;
      border: 2px dashed rgba(120, 170, 255, .95);
      border-radius: 12px; pointer-events: none;
      box-shadow: inset 0 0 0 9999px rgba(120, 170, 255, .06);
    }

    .caption-wrap {
      flex: 1 1 auto; min-height: 0;
      display: flex; align-items: center; justify-content: center;
      overflow: visible;  /* 不裁切字幕框，避免底部被切 */
    }
    .caption {
      max-width: 100%;
      background: rgba(0, 0, 0, 0.72);
      color: #fff;
      padding: 12px 22px;
      border-radius: 12px;
      font-size: 30px;
      line-height: 1.5;
      text-align: center;
      text-shadow: 0 2px 6px rgba(0,0,0,.9);
      opacity: 0;
      transform: translateY(14px);
      transition: opacity .3s ease-out, transform .3s ease-out;
      word-break: break-word;
    }
    .caption.show { opacity: 1; transform: translateY(0); }
    .caption .src { display: block; font-size: 16px; color: #b9c6da; margin-top: 6px; opacity: .85; }
    .caption .tag { display: inline-block; font-size: 13px; color: #8fb4ff; margin-right: 8px; vertical-align: middle; }
    .caption ruby { ruby-position: over; ruby-align: center; }
    .caption rt { font-size: 0.5em; color: #b9d4ff; font-weight: 400; line-height: 1; }

    /* 底部控制列（固定高度，正常排版 → 把手不會被切掉或消失） */
    .control-bar {
      flex: 0 0 40px; position: relative;
      /* 把手靠上對齊 → 往上一點，與視窗底部保持距離 */
      display: flex; align-items: flex-start; justify-content: center;
    }
    .drag-grip {
      cursor: move;
      background: rgba(0,0,0,.62); color: #d0d0d0;
      border-radius: 8px; padding: 3px 18px; font-size: 12px; letter-spacing: 4px;
      -webkit-user-select: none; white-space: nowrap;
    }
    .drag-grip:hover { background: rgba(0,0,0,.85); color: #fff; }
    .resize-handle {
      position: absolute; right: 0; bottom: 0; width: 20px; height: 20px;
      cursor: nwse-resize;
      background:
        linear-gradient(135deg, transparent 0 55%, rgba(255,255,255,.6) 55% 68%,
        transparent 68% 78%, rgba(255,255,255,.6) 78% 90%, transparent 90%);
      border-radius: 4px;
    }
    .resize-handle:hover { background:
        linear-gradient(135deg, transparent 0 55%, rgba(255,255,255,.95) 55% 68%,
        transparent 68% 78%, rgba(255,255,255,.95) 78% 90%, transparent 90%); }
  </style>
</head>
<body>
  <div id="overlayRoot">
    <div class="caption-wrap">
      <div class="caption" id="caption"></div>
    </div>
    <div class="control-bar">
      <div class="drag-grip" id="dragGrip" title="拖曳移動；點一下顯示視窗範圍">⠿ 拖曳 ⠿</div>
      <div class="resize-handle" id="resizeHandle" title="拖曳改變大小"></div>
    </div>
  </div>
  <script src="overlay.js"></script>
</body>
</html>
